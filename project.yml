name: UltraWin
options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    # No Team ID committed here: it lives in the gitignored
    # Config/Signing.local.xcconfig, pulled in via configFiles ->
    # Config/Build.xcconfig. See Config/Signing.local.xcconfig.example.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    # Managed by changesets: package.json is the source of truth, and
    # scripts/sync-version.sh rewrites this line. Do not hand-edit.
    MARKETING_VERSION: "1.0.0"
    # Overridden per-release in CI (xcodebuild CURRENT_PROJECT_VERSION=<n>).
    CURRENT_PROJECT_VERSION: "1"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.4
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: 2.0.0
targets:
  UltraWin:
    type: application
    platform: macOS
    configFiles:
      Debug: Config/Build.xcconfig
      Release: Config/Build.xcconfig
    sources:
      - path: UltraWin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ski.brezin.ultrawin
        PRODUCT_NAME: UltraWin
        INFOPLIST_FILE: UltraWin/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: UltraWin/UltraWin-Bridging-Header.h
        # Required for notarization. The app is NOT sandboxed: the private
        # CGVirtualDisplay API needs an unsandboxed process.
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Sparkle
      - package: TelemetryDeck
schemes:
  UltraWin:
    build:
      targets:
        UltraWin: all
    run:
      config: Debug
    archive:
      config: Release
