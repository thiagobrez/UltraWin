# Builds, signs, notarizes and publishes a tagged release:
#   archive (UltraWin) -> Developer ID export -> DMG -> notarize + staple
#                      -> attach DMG to the GitHub Release
#                      -> sign + publish Sparkle appcast to docs/ (GitHub Pages)
#                      -> update the Homebrew cask in thiagobrez/homebrew-tap
#
# There is no App Store channel: UltraWin uses the private CGVirtualDisplay
# API and runs unsandboxed, both of which App Review rejects. The App Store
# Connect API key below is used only for notarization (notarytool) and
# -allowProvisioningUpdates.
#
# Normally invoked by release-pr.yml (workflow_call) right after the tag is
# created. workflow_dispatch exists for re-runs and for dry-running the
# pipeline against an existing tag (toggle attach-dmg off).
#
# Required repo secrets: see RELEASING.md.
name: Build & Publish
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      attach-dmg:
        type: boolean
        default: true
      build-number:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build (e.g. v1.0.0)"
        required: true
        type: string
      attach-dmg:
        description: "Upload DMG to the GitHub Release for this tag"
        type: boolean
        default: true
      build-number:
        description: "Override CURRENT_PROJECT_VERSION (default: commit count)"
        type: string
        default: ""

permissions:
  contents: write # gh release upload

jobs:
  build:
    # macos-26 for parity with the Signal pipeline (and it future-proofs a
    # switch to an Icon Composer icon, which needs macOS 26 host frameworks).
    runs-on: macos-26
    timeout-minutes: 60
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_KEY_PATH: /tmp/asc/AuthKey.p8
      ARCHIVE_PATH: /tmp/build/UltraWin.xcarchive
      # Keep in sync with the Sparkle version in project.yml.
      SPARKLE_TOOLS_VERSION: "2.9.4"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0 # build number = git rev-list --count

      - name: Install tools
        run: brew install xcodegen create-dmg

      # Recreate the gitignored local xcconfigs the build expects. Skipping the
      # analytics one wouldn't fail the build — it would silently ship a
      # release with TelemetryDeck disabled.
      - name: Materialize local xcconfigs
        run: |
          printf 'DEVELOPMENT_TEAM = %s\n' "$APPLE_TEAM_ID" > Config/Signing.local.xcconfig
          printf 'TELEMETRYDECK_APP_ID = %s\n' "${{ secrets.TELEMETRYDECK_APP_ID }}" > Config/Analytics.local.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve version and build number
        id: ver
        env:
          TAG: ${{ inputs.tag }}
          OVERRIDE: ${{ inputs.build-number }}
        run: |
          VERSION="${TAG#v}"
          grep -q "MARKETING_VERSION: \"$VERSION\"" project.yml \
            || { echo "project.yml MARKETING_VERSION does not match tag $TAG" >&2; exit 1; }
          BUILD="${OVERRIDE:-$(git rev-list --count HEAD)}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

      # Developer ID certs are not cloud-managed, so the p12 import is
      # mandatory for the DMG path.
      - name: Set up keychain and Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/devid.p12"
          security import "$RUNNER_TEMP/devid.p12" -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          rm "$RUNNER_TEMP/devid.p12"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          mkdir -p "$(dirname "$ASC_KEY_PATH")"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$ASC_KEY_PATH"

      - name: Archive
        run: |
          xcodebuild -project UltraWin.xcodeproj -scheme UltraWin -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            CURRENT_PROJECT_VERSION="${{ steps.ver.outputs.build }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            archive

      - name: Export (Developer ID)
        run: |
          sed "s/__TEAM_ID__/$APPLE_TEAM_ID/" .github/export-options/developer-id.plist > /tmp/eo-devid.plist
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/eo-devid.plist \
            -exportPath /tmp/build/export-devid \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "UltraWin" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "UltraWin.app" 140 180 \
            --app-drop-link 400 180 \
            --hide-extension "UltraWin.app" \
            "UltraWin-${{ steps.ver.outputs.version }}.dmg" \
            /tmp/build/export-devid/UltraWin.app

      # create-dmg produces an unsigned image; notarization accepts that (it
      # validates the app inside), but Gatekeeper's spctl check on the DMG
      # itself fails with "no usable signature" unless the DMG is signed too.
      - name: Sign DMG
        run: |
          codesign --force --timestamp --sign "Developer ID Application" \
            "UltraWin-${{ steps.ver.outputs.version }}.dmg"
          codesign --verify --verbose=2 "UltraWin-${{ steps.ver.outputs.version }}.dmg"

      - name: Notarize and staple
        run: |
          xcrun notarytool submit "UltraWin-${{ steps.ver.outputs.version }}.dmg" \
            --key "$ASC_KEY_PATH" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 30m
          xcrun stapler staple "UltraWin-${{ steps.ver.outputs.version }}.dmg"
          spctl -a -t open --context context:primary-signature -v "UltraWin-${{ steps.ver.outputs.version }}.dmg"

      # --clobber keeps dispatch re-runs idempotent. The unversioned copy gives
      # the website an evergreen URL:
      # https://github.com/thiagobrez/UltraWin/releases/latest/download/UltraWin.dmg
      - name: Attach DMG to GitHub Release
        if: inputs.attach-dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # The changesets flow creates the release (with changelog notes)
          # before this job runs; for bootstrapped/manual tags it won't exist
          # yet, so create it here with the latest CHANGELOG.md section.
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            awk '/^## /{if (found) exit; found=1; next} found' CHANGELOG.md > /tmp/notes.md || true
            [ -s /tmp/notes.md ] || echo "UltraWin $VERSION" > /tmp/notes.md
            gh release create "$TAG" --verify-tag \
              --title "UltraWin $VERSION" --notes-file /tmp/notes.md
          fi
          cp "UltraWin-$VERSION.dmg" UltraWin.dmg
          gh release upload "$TAG" "UltraWin-$VERSION.dmg" UltraWin.dmg --clobber

      # The appcast is what Sparkle-equipped installs poll for updates. It is
      # regenerated from scratch each release (single item — Sparkle only
      # offers the latest version) and committed to docs/ on master, which
      # GitHub Pages serves at https://thiagobrez.github.io/UltraWin/appcast.xml.
      # Runs after notarization so the EdDSA signature covers the stapled
      # bytes users actually download.
      - name: Publish Sparkle appcast
        if: inputs.attach-dmg
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          [ -n "$SPARKLE_ED_PRIVATE_KEY" ] \
            || { echo "SPARKLE_ED_PRIVATE_KEY secret is not set (see RELEASING.md)" >&2; exit 1; }

          curl -fsSL -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_TOOLS_VERSION/Sparkle-$SPARKLE_TOOLS_VERSION.tar.xz"
          mkdir -p /tmp/sparkle
          tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle

          # Stage the DMG plus release notes. The .html must share the DMG's
          # basename for generate_appcast --embed-release-notes to pick it up.
          mkdir -p /tmp/appcast
          cp "UltraWin-$VERSION.dmg" /tmp/appcast/
          awk '/^## /{if (found) exit; found=1; next} found' CHANGELOG.md > /tmp/notes.md || true
          [ -s /tmp/notes.md ] || echo "UltraWin $VERSION" > /tmp/notes.md
          npx --yes marked --gfm < /tmp/notes.md > "/tmp/appcast/UltraWin-$VERSION.html"

          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > /tmp/eddsa.key
          /tmp/sparkle/bin/generate_appcast /tmp/appcast \
            --ed-key-file /tmp/eddsa.key \
            --download-url-prefix "https://github.com/thiagobrez/UltraWin/releases/download/v$VERSION/" \
            --link "https://thiagobrez.github.io/UltraWin/" \
            --embed-release-notes \
            -o /tmp/appcast/appcast.xml
          rm -f /tmp/eddsa.key

          # This job checked out the release tag; the appcast lives on master.
          git fetch origin master
          git worktree add /tmp/site origin/master
          cp /tmp/appcast/appcast.xml /tmp/site/docs/appcast.xml
          cd /tmp/site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "chore: publish appcast for v$VERSION [skip ci]"
          git push origin HEAD:master

      # The cask pins the sha256 of the exact DMG uploaded above, so this must
      # run after the release upload. Pushed straight to the tap's main branch
      # (no PR) so `brew install thiagobrez/tap/ultrawin` serves the new
      # version as soon as the release is out. The cask template lives in
      # scripts/update-homebrew-cask.sh.
      - name: Update Homebrew tap
        if: inputs.attach-dmg
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          [ -n "$TAP_TOKEN" ] \
            || { echo "HOMEBREW_TAP_TOKEN secret is not set (see RELEASING.md)" >&2; exit 1; }
          SHA256=$(shasum -a 256 "UltraWin-$VERSION.dmg" | awk '{print $1}')
          git clone --depth 1 \
            "https://x-access-token:$TAP_TOKEN@github.com/thiagobrez/homebrew-tap.git" /tmp/tap
          ./scripts/update-homebrew-cask.sh "$VERSION" "$SHA256" /tmp/tap
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ultrawin.rb
          # --clobber-style idempotency for dispatch re-runs: an identical cask
          # produces an empty diff, which is success, not failure.
          git diff --cached --quiet && { echo "cask already up to date"; exit 0; }
          git commit -m "ultrawin $VERSION"
          git push origin HEAD:main

      - name: Upload dry-run artifact
        if: ${{ !inputs.attach-dmg }}
        uses: actions/upload-artifact@v4
        with:
          name: UltraWin-dmg
          path: UltraWin-*.dmg

      - name: Clean up keychain and API key
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          security list-keychains -d user -s login.keychain-db
          rm -f "$ASC_KEY_PATH"
